# Conda environment for the Miller-Pera FF pipeline.
#
#   conda env create -f environment.yml
#   conda activate p312
#
# xcdat, xesmf and esmpy are conda-forge only (xesmf binds the compiled
# ESMF library via esmpy; xcdat is not published to PyPI), so the whole
# environment is built from conda-forge for a consistent binary stack.
#
# Versions are pinned EXACTLY to the set the v2026b product was built and
# validated against (May 2026). Exact pins are deliberate: an unpinned
# dependency that shifts a binary ABI is exactly how a silently-wrong
# numerical output happens — this is the lesson of the PyFerret numpy-ABI
# breakage. The versions that produced an output file are also recorded
# inside the file itself (see provenance.py).
#
# To move to newer releases: bump the pins here, re-run the verification
# notebooks (verify.ipynb / verify_nrt.ipynb), update requirements.txt, and
# regenerate conda-lock.yml (`make lock`) — all in the same commit.
#
# conda-lock.yml is the fully resolved, multi-platform lock generated from
# this file: every transitive package pinned to an exact build (osx-arm64
# and linux-64). Install a bit-identical environment from it with:
#   conda-lock install -n p312 conda-lock.yml
name: p312
channels:
  - conda-forge
dependencies:
  - python=3.12.2
  # ── core scientific stack ────────────────────────────────────────────────
  - numpy=2.3.5
  - scipy=1.17.0
  - pandas=2.2.3
  - xarray=2024.11.0
  - netcdf4=1.7.4
  - cftime=1.6.4              # netCDF date encoding/decoding
  - openpyxl=3.1.5            # CDIAC / EI / USGS .xlsx reading
  - python-dateutil=2.9.0.post0
  - matplotlib-base=3.10.0    # summary + comparison figures
  # ── CF / units / regridding ──────────────────────────────────────────────
  - cf_xarray=0.10.11
  - pint=0.25.2               # imported directly (must precede pint_xarray)
  - pint-xarray=0.6.0
  - xcdat=0.11.2              # monkey-patches .bounds.add_time_bounds
  - xesmf=0.8.8               # EDGAR 0.1° → 1° regridding
  - esmpy=8.9.1               # compiled ESMF library that xesmf binds to
  # ── notebooks (verify.ipynb / verify_nrt.ipynb) ──────────────────────────
  - ipython=8.30.0
  - nbconvert=7.16.6
  - ipykernel=6.29.5          # kernel for `jupyter nbconvert --execute`
  - notebook=7.3.2            # interactive inspection of the verify notebooks
  # ── dev tooling (lint / test / git hooks) ────────────────────────────────
  - ruff=0.15.12
  - pytest=9.0.3
  - hypothesis=6.152.7        # property-based tests (tests/test_properties.py)
  - pre-commit=4.6.0
  # ── pip-only ─────────────────────────────────────────────────────────────
  # mypy 2.x is not published to conda-forge (its feed stops at the 1.x
  # series), so the type-checker is installed with pip as the final step.
  - pip
  - pip:
    - mypy==2.1.0
