# pyproject.toml — ruff configuration for the Miller-Pera FF pipeline.
#
# Strategy: enable everything in ruff (`select = ["ALL"]`) and suppress only
# the categories that are inappropriate for a scientific data pipeline. The
# remaining warnings are real issues worth a hand-fix (unused vars, datetime
# without tz, zip-strict, etc.).

[tool.ruff]
line-length = 100
target-version = "py312"
# Notebooks are exempt from the default scan — they contain a lot of research-style
# code that hasn't been linted. To clean one up explicitly:
#     ruff check --fix verify.ipynb
extend-exclude = ["archive", "__pycache__", ".venv", "delivery", "*.ipynb"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q --tb=short"

[tool.ruff.lint]
select = ["ALL"]

ignore = [
    # ── Style preferences for a research pipeline ───────────────────────────
    "E501",     # line too long  (line-length already raised to 100)
    "T201",     # print()        (used for pipeline progress reporting)
    "S101",     # assert         (used for runtime invariants in scripts)
    "N806",     # non-lowercase locals  (R_km, Gg_to_mol — scientific convention)
    "N811",     # constant imported as non-constant
    "N816",     # mixedCase in global scope

    # ── Type annotations — optional for research scripts ────────────────────
    "ANN001",   # missing arg annotation
    "ANN201",   # missing return annotation (public)
    "ANN202",   # missing return annotation (private)

    # ── "Ambiguous" Unicode — × ° – µ are legitimate scientific characters ──
    "RUF001",   # in strings
    "RUF002",   # in docstrings
    "RUF003",   # in comments

    # ── Pandas style preferences (we use the older idioms intentionally) ────
    "PD002",    # avoid inplace=True
    "PD008",    # .loc over .at (.at is fine for scalar; faster, more explicit)
    "PD010",    # .pivot_table over .pivot
    "PD011",    # .to_numpy() over .values
    "PD013",    # .melt over .stack

    # ── pathlib vs os.path — both are acceptable here ──────────────────────
    "PTH100", "PTH103", "PTH110", "PTH118", "PTH119", "PTH120",
    "PTH123", "PTH207", "PTH208",

    # ── Magic values — many "magic numbers" are the actual scientific values
    "PLR2004",

    # ── Complexity — large main() functions are pipeline orchestration ──────
    "PLR0911",  # too many returns
    "PLR0912",  # too many branches
    "PLR0913",  # too many arguments
    "PLR0915",  # too many statements
    "C901",     # function too complex

    # ── Docstring formatting — pedantic for a research codebase ─────────────
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107",
    "D200", "D202", "D203", "D205", "D212", "D213",
    "D400", "D401", "D404", "D413", "D415", "D417",

    # ── Exception-message formatting (long f-string messages are fine) ──────
    "TRY003", "EM101", "EM102",

    # ── Conflicts with the formatter / formatter handles ────────────────────
    "COM812",   # missing trailing comma
    "ISC001",   # implicit string concat (single-line)
    "ISC002",   # implicit string concat (multi-line)

    # ── Miscellaneous not-a-bug ─────────────────────────────────────────────
    "FBT003",   # boolean positional in function call
    "RUF005",   # consider list spread instead of concatenation
    "RUF007",   # prefer itertools.pairwise
    "RUF015",   # prefer next(iter(x))
    "PERF401",  # manual list comprehension
    "S603",     # subprocess without explicit shell=False (false-positive heavy)
    "S607",     # partial executable path — invoking `git` on PATH is intentional
    "EXE001",   # shebang present but file not executable (chmod is build-time)
    "PLW0108",  # lambda may be unnecessary
    "F541",     # f-string without placeholder (sometimes intentional templating)
]

[tool.ruff.lint.per-file-ignores]
# Notebooks are research/exploratory; relax further.
"*.ipynb" = [
    "E402",     # imports not at top (cells reimport)
    "E702",     # multiple statements on one line
    "E731",     # lambda assignment
    "F841",     # unused local variable
    "B007",     # unused loop variable
    "B905",     # zip without strict
    "PLW2901",  # for-loop variable overwritten
    "DTZ001",   # datetime without tzinfo
    "A004",     # `display` (from IPython.display) shadows a builtin — common idiom
    "PT018",    # multi-clause asserts — fine in notebook checks
]
"tests/*.py" = [
    "S101",     # assert is the whole point of pytest
    "ANN",      # test functions don't need annotations
    "PLR2004",  # magic values are normal in test fixtures
    "D",        # docstring rules — keep tests terse
    "INP001",   # tests/ doesn't need __init__ (we have one anyway)
    "PT004",    # fixture not returning a value
    "PLC0415",  # late imports are fine in skip-if-missing patterns
    "N806",     # uppercase locals (H, W, SUBDIV_PREFIXES) used as constants
    "PT018",    # multi-clause asserts — fine in numpy boolean checks
    "SLF001",   # tests legitimately exercise private (_-prefixed) functions
]


# ─────────────────────────────────────────────────────────────────────────────
# mypy: type-check the pipeline scripts.
#
# Run with the project's conda env so package types resolve:
#     mypy --python-executable=$(conda run -n p312 which python) .
# or just `mypy .` if the env is already active.
# ─────────────────────────────────────────────────────────────────────────────

[tool.mypy]
python_version = "3.12"
exclude = [
    "archive/",
    "delivery/",
    "__pycache__/",
    ".venv/",
]
# Most of our scientific stack (xesmf, xcdat, cf_xarray, pint_xarray,
# dateutil, openpyxl) ships without type stubs. Don't fail the run on that.
ignore_missing_imports = true
# Equivalent to --strict, minus warn_return_any (numpy/pandas operations
# widen to Any in many cases and chasing those down isn't worth the noise
# in research code).
warn_unused_configs = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_reexport = true
strict_equality = true
extra_checks = true
warn_return_any = false

# Tests don't need full strictness — pytest fixtures, parametrize, and
# duck-typed conftest plumbing don't benefit from chasing every missing
# annotation.
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
check_untyped_defs = true
ignore_missing_imports = true
