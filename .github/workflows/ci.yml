name: CI

# Lint, type-check, and unit-test on every push and pull request.
#
# This job deliberately does NOT install the heavy geospatial stack
# (xesmf / xcdat / cf_xarray / pint). None of the unit tests import the
# modules that need it (ingest_2026 / post_process_2026), and mypy is
# configured with `ignore_missing_imports = true`, so a lightweight pip
# install is enough to run all three gates. The data-dependent tests
# (schema / grid / ratio checks) skip gracefully when the gitignored
# input files aren't present — which they won't be in CI.
#
# Full reproduction of the pipeline needs the conda env (environment.yml).

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint / type / test dependencies
        # Pinned ranges keep CI stable: a new ruff minor can add rules that
        # `select = ["ALL"]` would surface, and mypy minors can shift
        # diagnostics. Bump deliberately, in step with environment.yml.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "ruff>=0.15,<0.16" \
            "mypy>=1.11,<1.18" \
            "pytest>=9.0,<10" \
            "numpy>=2.3,<3" \
            "pandas>=2.2,<3" \
            "xarray>=2024.11" \
            "netCDF4>=1.7,<2" \
            "python-dateutil>=2.9,<3"

      - name: Ruff (lint)
        run: ruff check

      - name: Mypy (type-check)
        run: mypy .

      - name: Pytest (unit tests)
        # Data-dependent tests skip when inputs/ xlsx + processed_inputs/
        # aren't present; the pure-function tests run fully.
        run: pytest
