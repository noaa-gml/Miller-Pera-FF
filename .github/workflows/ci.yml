name: CI

# Lint, type-check, and unit-test on every push and pull request.
#
# CI installs the exact pinned set from requirements.txt. That file is the
# pip-installable subset of the environment; the conda-only geospatial
# extras (xesmf / xcdat / esmpy) are deliberately absent. No unit test
# imports the modules that need them (ingest / post_process), and mypy is
# configured with `ignore_missing_imports = true`, so this is enough to run
# all three gates. The data-dependent tests (schema / grid / ratio checks)
# skip gracefully when the gitignored input files aren't present — which
# they won't be in CI.
#
# Full reproduction of the pipeline needs the conda env (environment.yml).

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # requirements.txt holds the exact pins the product was built and
        # validated with, so CI runs those same versions and can never drift
        # out of step with a hand-maintained range list. Bump pins there.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check

      - name: Mypy (type-check)
        run: mypy .

      - name: Pytest (unit tests)
        # Data-dependent tests skip when inputs/ xlsx + processed_inputs/
        # aren't present; the pure-function tests run fully.
        run: pytest
