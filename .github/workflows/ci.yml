name: CI

# Two jobs run on every push and pull request:
#
#   checks        Fast gate. Installs the pip-only subset (requirements.txt)
#                 and runs ruff + mypy + pytest. The conda-only geospatial
#                 extras (xesmf / xcdat / esmpy) are absent, so the tests
#                 that need them skip — see tests/test_imports.py and the
#                 data-dependent schema / grid / ratio tests.
#
#   conda-checks  Full environment. Builds the exact pinned conda env from
#                 environment.yml and runs pytest with the complete stack,
#                 so the geospatial modules (ingest / post_process) are
#                 actually imported and exercised. Doubles as a check that
#                 environment.yml still solves on conda-forge.
#
# The data-dependent tests skip gracefully when the gitignored input files
# aren't present — which they won't be in CI.

on:
  push:
  pull_request:

jobs:
  checks:
    name: lint + type + test (pip subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # requirements.txt holds the exact pins the product was built and
        # validated with, so CI runs those same versions and can never drift
        # out of step with a hand-maintained range list. Bump pins there.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check

      - name: Mypy (type-check)
        run: mypy .

      - name: Pytest (unit tests)
        # Data-dependent tests skip when inputs/ xlsx + processed_inputs/
        # aren't present; the pure-function tests run fully.
        run: pytest

  conda-checks:
    name: conda env + full test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the pinned conda environment
        # Solving environment.yml here is itself a test: it catches a pin
        # that no longer resolves on conda-forge.
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Pytest (full geospatial stack)
        # With xesmf / xcdat present the modules the lightweight job cannot
        # import (ingest / post_process) are exercised here.
        shell: bash -el {0}
        run: pytest
